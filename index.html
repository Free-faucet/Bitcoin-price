<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Price & Profit Calculator</title>

<meta name="description" content="Kalkulator keuntungan Bitcoin real-time dengan harga live USD dan IDR. Untuk analisis dan tools lengkap, kunjungi CryptoKita.">

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  padding: 20px;
}
.container {
  max-width: 700px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}
h1, h2 { text-align: center; }
.card {
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}
.result {
  font-weight: bold;
  margin-top: 10px;
  font-size: 16px;
}
.price {
  font-size: 18px;
  font-weight: bold;
}
.small {
  font-size: 13px;
  color: #cbd5e1;
}
.footer-link {
  text-align: center;
  margin-top: 30px;
  font-size: 14px;
}
.footer-link a {
  color: #facc15;
  text-decoration: none;
  font-weight: bold;
}
.footer-link a:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

<h1>Bitcoin Price & Profit Calculator</h1>

<div class="card">
  <div class="price">Harga BTC USD: <span id="btcUsd">Loading...</span></div>
  <div class="price">Harga BTC IDR: <span id="btcIdr">Loading...</span></div>
  <div class="small">Update otomatis setiap 60 detik</div>
</div>

<h2>Kalkulator Keuntungan</h2>

<div class="card">

<label>Pilih Mata Uang</label>
<select id="currency">
  <option value="usd">USD</option>
  <option value="idr">IDR</option>
</select>

<label>Modal Investasi</label>
<input type="number" id="modal" placeholder="Contoh: 1000">

<label>Harga Beli BTC</label>
<input type="number" id="buyPrice" placeholder="Harga saat beli">

<label>Harga Sekarang / Harga Jual</label>
<input type="number" id="currentPrice" placeholder="Harga saat ini">

<div class="result" id="output"></div>

</div>

<div class="footer-link">
  Untuk analisis mendalam, edukasi crypto, dan tools tambahan seperti DCA & simulasi mining,
  kunjungi <a href="https://www.cryptokita.com" target="_blank">CryptoKita.com</a>
</div>

</div>

<script>
let liveUSD = 0;
let liveIDR = 0;

async function fetchBTC() {
  const response = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd,idr");
  const data = await response.json();

  liveUSD = data.bitcoin.usd;
  liveIDR = data.bitcoin.idr;

  document.getElementById("btcUsd").innerText = "$" + liveUSD.toLocaleString();
  document.getElementById("btcIdr").innerText = "Rp " + liveIDR.toLocaleString();
}

function calculate() {
  const currency = document.getElementById("currency").value;
  const modal = parseFloat(document.getElementById("modal").value);
  const buy = parseFloat(document.getElementById("buyPrice").value);
  const current = parseFloat(document.getElementById("currentPrice").value);

  if (isNaN(modal) || isNaN(buy) || isNaN(current)) {
    document.getElementById("output").innerText = "";
    return;
  }

  const btcAmount = modal / buy;
  const currentValue = btcAmount * current;
  const profit = currentValue - modal;
  const percent = ((profit / modal) * 100).toFixed(2);

  const symbol = currency === "usd" ? "$" : "Rp ";

  document.getElementById("output").innerHTML =
    "Jumlah BTC: " + btcAmount.toFixed(6) + " BTC<br>" +
    "Nilai Sekarang: " + symbol + currentValue.toLocaleString() + "<br>" +
    "Keuntungan / Kerugian: " + symbol + profit.toLocaleString() + "<br>" +
    "Return: " + percent + "%";
}

document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("input", calculate);
});

fetchBTC();
setInterval(fetchBTC, 60000);
</script>

</body>
</html>
