<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Price Tracker & Kalkulator Profit</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 700px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}
h1 { text-align: center; }
.card {
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}
button {
  background: #f59e0b;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}
.result {
  font-weight: bold;
  margin-top: 10px;
}
.price {
  font-size: 20px;
  font-weight: bold;
}
.small {
  font-size: 14px;
  color: #cbd5e1;
}
</style>
</head>

<body>

<div class="container">

<h1>Bitcoin Price Tracker</h1>

<div class="card">
  <div class="price">Harga BTC (USD): <span id="btcUsd">Loading...</span></div>
  <div class="price">Harga BTC (IDR): <span id="btcIdr">Loading...</span></div>
  <div class="small">Update otomatis setiap 60 detik</div>
</div>

<h2>Kalkulator Profit Bitcoin</h2>

<div class="card">
  <label>Harga Beli (USD)</label>
  <input type="number" id="buyPrice" placeholder="Contoh: 30000">

  <label>Jumlah BTC</label>
  <input type="number" id="amount" placeholder="Contoh: 0.1">

  <label>Harga Jual / Harga Sekarang (USD)</label>
  <input type="number" id="sellPrice" placeholder="Contoh: 45000">

  <button onclick="calculate()">Hitung Profit</button>

  <div class="result" id="output"></div>
</div>

</div>

<script>
async function fetchBTC() {
  const response = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd,idr");
  const data = await response.json();

  const usd = data.bitcoin.usd;
  const idr = data.bitcoin.idr;

  document.getElementById("btcUsd").innerText = "$" + usd.toLocaleString();
  document.getElementById("btcIdr").innerText = "Rp " + idr.toLocaleString();
}

function calculate() {
  const buy = parseFloat(document.getElementById("buyPrice").value);
  const amount = parseFloat(document.getElementById("amount").value);
  const sell = parseFloat(document.getElementById("sellPrice").value);

  if (isNaN(buy) || isNaN(amount) || isNaN(sell)) {
    document.getElementById("output").innerText = "Isi semua kolom dengan benar.";
    return;
  }

  const modal = buy * amount;
  const value = sell * amount;
  const profit = value - modal;
  const percent = ((profit / modal) * 100).toFixed(2);

  document.getElementById("output").innerHTML =
    "Modal: $" + modal.toLocaleString() + "<br>" +
    "Nilai Saat Ini: $" + value.toLocaleString() + "<br>" +
    "Profit / Loss: $" + profit.toLocaleString() + "<br>" +
    "Return: " + percent + "%";
}

fetchBTC();
setInterval(fetchBTC, 60000);
</script>

</body>
</html>
